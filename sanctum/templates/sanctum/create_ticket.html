<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Submit Machine Spirit - Sanctum</title>
    <style>
        /* โทนสีและพื้นหลังสไตล์ Lexicanum (Warhammer 40k) */
        body {
            background-color: #6a6a6a; /* สีเทาเข้ม */
            color: #000;
            font-family: 'Times New Roman', Times, serif; /* ฟอนต์สไตล์คลาสสิก/วิกิพีเดีย */
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #f8f9fa; /* สีเนื้อกระดาษ Data-slate */
            border: 2px solid #333;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6);
            padding: 40px;
        }
        h1 {
            border-bottom: 2px solid #888;
            padding-bottom: 10px;
            font-size: 2.5em;
            font-weight: normal;
            margin-top: 0;
        }
        .quote-box {
            background-color: #e9ecef;
            border: 1px solid #ccc;
            padding: 15px;
            font-style: italic;
            text-align: center;
            margin-bottom: 30px;
        }
        /* ตกแต่งแบบฟอร์ม */
        .form-group p {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 1.1em;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #999;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }
        .btn-submit {
            background-color: #2c2c2c;
            color: #fff;
            border: 2px solid #000;
            padding: 15px 30px;
            font-size: 1.2em;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .btn-submit:hover {
            background-color: #4a5d23; /* สีเขียวทหารตอนเอาเมาส์ชี้ */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ลงทะเบียนเครื่องซ่อม (Submit Cogitator)</h1>
        
        <div class="quote-box">
            "เครื่องจักรทุกชิ้นมีวิญญาณ (Machine Spirit) จงดูแลมันด้วยความเคารพ แล้วมันจะรับใช้ท่านอย่างซื่อสัตย์"<br>
            <strong>-- กฎแห่ง Adeptus Mechanicus</strong>
        </div>

        <form method="POST" class="form-group">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">ประทับตราแจ้งซ่อม (Initiate Repair Rite)</button>
        </form>
        <div style="margin-top: 20px; text-align: left;">
    <a href="{% url 'home' %}" style="text-decoration: none; color: #8b6d11; font-weight: bold;">
        « กลับสู่หน้าหลักวิหาร (Return to Main Page)
    </a>
</div>
    </div>

</body>
</html>
